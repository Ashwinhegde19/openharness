name: Feature request
description: Suggest a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? Who experiences it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Include any command/flag/UX sketch.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / non-goals
      description: What should this explicitly NOT do, to keep the design bounded?
