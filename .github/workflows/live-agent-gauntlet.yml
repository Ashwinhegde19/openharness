name: Live Agent Gauntlet

on:
  workflow_dispatch:
    inputs:
      harness:
        description: "Harness test file to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - claude
          - codex
          - live-models-check
          - opencode
          - pi

  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-agent-gauntlet.yml"
      - ".oxfmtrc.json"
      - "package.json"
      - "packages/cli/**"
      - "packages/models/**"
      - "packages/tests/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "site/**"

concurrency:
  group: live-agent-gauntlet-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live:
    name: Real inference harness tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      TOGETHERLINK_DEBUG: "1"
      VITEST_RETRY: "3"
      HARNESS: ${{ github.event.inputs.harness || 'all' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      # Live gauntlet needs a real Together key. Without the secret, skip cleanly
      # (do not fail the push) so public forks and early setup stay green.
      - name: Check Together secret
        id: secret
        run: |
          if [ -z "$TOGETHER_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Live Agent Gauntlet skipped"
              echo ""
              echo "Repository secret \`TOGETHER_API_KEY\` is not configured."
              echo "Add it under **Settings → Secrets and variables → Actions** to enable live harness tests."
              echo "Offline checks run in the separate **CI** workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "TOGETHER_API_KEY not configured — skipping live inference gauntlet."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install workspace dependencies
        if: steps.secret.outputs.present == 'true'
        run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false

      - name: Restore Turborepo cache
        if: steps.secret.outputs.present == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Verify TypeScript native compiler
        if: steps.secret.outputs.present == 'true'
        run: node_modules/.bin/tsc --version

      - name: Check formatting
        if: steps.secret.outputs.present == 'true'
        run: pnpm format:check

      - name: Typecheck workspace
        if: steps.secret.outputs.present == 'true'
        run: pnpm typecheck

      - name: Install coding-agent CLIs
        if: steps.secret.outputs.present == 'true'
        run: |
          case "$HARNESS" in
            all)
              # OpenCode's official npm package is `opencode-ai`; it installs the
              # `opencode` binary. See https://github.com/anomalyco/opencode.
              npm install -g @anthropic-ai/claude-code @openai/codex opencode-ai@latest @earendil-works/pi-coding-agent
              claude --version
              codex --version
              opencode --version
              pi --version
              ;;
            live-models-check)
              npm install -g @anthropic-ai/claude-code @openai/codex
              claude --version
              codex --version
              ;;
            claude)
              npm install -g @anthropic-ai/claude-code
              claude --version
              ;;
            codex)
              npm install -g @openai/codex
              codex --version
              ;;
            opencode)
              # OpenCode's official npm package is `opencode-ai`; it installs the
              # `opencode` binary. See https://github.com/anomalyco/opencode.
              npm install -g opencode-ai@latest
              opencode --version
              ;;
            pi)
              npm install -g @earendil-works/pi-coding-agent
              pi --version
              ;;
            *)
              echo "Unknown harness: $HARNESS" >&2
              exit 1
              ;;
          esac

      - name: Build togetherlink CLI
        if: steps.secret.outputs.present == 'true'
        run: pnpm exec turbo run build --filter @togetherlink/models --filter @togetherlink/cli

      - name: Typecheck live tests
        if: steps.secret.outputs.present == 'true'
        run: node_modules/.bin/tsc -p packages/tests/tsconfig.json --noEmit

      - name: Run live agent gauntlet
        if: steps.secret.outputs.present == 'true'
        run: |
          case "$HARNESS" in
            all)
              VITEST_FILE_PARALLELISM=0 VITEST_MAX_CONCURRENCY=1 pnpm exec turbo run test:gauntlet:core test:gauntlet:claude test:gauntlet:codex test:gauntlet:opencode test:gauntlet:pi --filter @togetherlink/tests --concurrency=1
              ;;
            claude)
              pnpm exec turbo run test:gauntlet:claude --filter @togetherlink/tests
              ;;
            codex)
              pnpm exec turbo run test:gauntlet:codex --filter @togetherlink/tests
              ;;
            live-models-check)
              pnpm exec turbo run test:gauntlet:live-models-check --filter @togetherlink/tests
              ;;
            opencode)
              pnpm exec turbo run test:gauntlet:opencode --filter @togetherlink/tests
              ;;
            pi)
              pnpm exec turbo run test:gauntlet:pi --filter @togetherlink/tests
              ;;
            *)
              echo "Unknown harness: $HARNESS" >&2
              exit 1
              ;;
          esac

      - name: Stop togetherlink daemon
        if: always() && steps.secret.outputs.present == 'true'
        run: node packages/cli/dist/bin/openharness.js daemon stop || true

      - name: Save Turborepo cache
        if: always() && steps.secret.outputs.present == 'true'
        uses: actions/cache/save@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload live test artifacts
        if: always() && steps.secret.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-agent-gauntlet-artifacts
          path: packages/tests/artifacts/
          if-no-files-found: ignore
          retention-days: 14
