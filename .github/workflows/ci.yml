name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: Offline checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false

      - name: Check formatting
        run: pnpm format:check

      - name: Validate compatibility matrix
        run: pnpm matrix:validate

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build packages
        run: pnpm exec turbo run build --filter @togetherlink/models --filter @togetherlink/cli

      - name: Run offline unit and proxy tests
        run: >
          pnpm -F @togetherlink/tests exec vitest run
          --exclude 'src/{Claude,Codex,OpenCode,Pi,LiveSmoke,livemodelscheck,daemon-session-auth}.test.ts'
